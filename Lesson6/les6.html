<form class="form-registration">
    <label for="name">text your name</label>
    <input type="text" name="firstname" id="name" placeholder="First Name" required><sup>*</sup>


    <label for="email">text your email</label>
    <input type="email" name="email" id="email" placeholder="example@com" required><sup>*</sup>


    <label for="number">text your age</label>
    <input type="number" name="number" id="number" min="18" max="99" placeholder="Age" required>


    <label>gender</label>
    <label> <input type="radio" name="gender" value="male">male</label>
    <label> <input type="radio" name="gender" value="female">female</label>


</form>
